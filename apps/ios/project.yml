name: SeriesAV
options:
  bundleIdPrefix: com.avalsys
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    PRODUCT_NAME: Series AV
    SWIFT_VERSION: "6.0"

packages:
  AccountAV:
    path: ../../../account-av
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: 1.0.0

schemes:
  SeriesAV:
    build:
      targets:
        SeriesAV: all
    run:
      config: Debug
      executable: SeriesAV
    analyze:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
    management:
      shared: true

targets:
  SeriesAV:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: SeriesAV
    dependencies:
      - package: AccountAV
        product: AccountAV
      - package: Clerk
        product: ClerkKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SeriesAV/App/SeriesAV.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(AVALSYS_APPLE_DEVELOPMENT_TEAM)"
        INFOPLIST_FILE: SeriesAV/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
